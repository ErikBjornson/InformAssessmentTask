name: Run flake8 and pytest tests

on:
  workflow_dispatch:

jobs:
  flake8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: '3.11'
      - name: Run flake8
        run: flake8 .

  extract_total_area_func_tests:
    runs-on: ubuntu-latest
    needs: flake8
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: '3.11'
      - name: Run pytest tests
        run: pytest -rsx -m extract_total_area
  
  split_num_and_text_func_tests:
    runs-on: ubuntu-latest
    needs: flake8
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: '3.11'
      - name: Run pytest tests
        run: pytest -rsx -m split_num_and_text
